<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGO Detail – SmartAid</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    window.SUPABASE_URL = 'https://qujgjwjgyrpbxwjjtrcb.supabase.co';
    window.SUPABASE_KEY = 'sb_publishable_8nbpJqNgUrhAVV1Z-qTvzw_cvs1FWU1';
    window.BACKEND_URL = 'http://127.0.0.1:8000';
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .hero-ngo {
      background: var(--grad-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      padding: 40px;
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .hero-ngo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, .04), rgba(124, 58, 237, .04));
      pointer-events: none;
    }

    .hero-avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--r-md);
      background: var(--grad-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      flex-shrink: 0;
    }

    .hero-info {
      flex: 1;
      min-width: 220px;
    }

    .hero-name {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -.02em;
      margin-bottom: 8px;
    }

    .current-task-card {
      background: linear-gradient(135deg, rgba(0, 212, 255, .07), rgba(124, 58, 237, .07));
      border: 1px solid rgba(0, 212, 255, .2);
      border-radius: var(--r-lg);
      padding: 28px;
      margin-bottom: 32px;
    }

    .task-not-assigned {
      background: rgba(255, 255, 255, .03);
      border: 1px dashed rgba(255, 255, 255, .12);
      border-radius: var(--r-lg);
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    #ngo-detail-map {
      width: 100%;
      height: 350px;
      border-radius: var(--r-md);
      border: 1px solid var(--glass-border);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .metric-box {
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 18px 20px;
    }

    .metric-val {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1;
    }

    .metric-lbl {
      font-size: .75rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-top: 6px;
    }

    .update-pct-form {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .update-pct-form input {
      max-width: 90px;
    }
  </style>
</head>

<body>

  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 28 28" fill="none">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d4ff" />
            <stop offset="100%" stop-color="#7c3aed" />
          </linearGradient>
        </defs>
        <path d="M14 3L3 9L14 15L25 9L14 3Z" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round" fill="none" />
        <path d="M3 19L14 25L25 19" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round" fill="none" />
        <path d="M3 14L14 20L25 14" stroke="url(#g1)" stroke-width="2" stroke-linejoin="round" fill="none" />
      </svg>
      SmartAid
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">📋 Report Problem</a>
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="ngos.html" class="nav-link active">🏢 NGO Portal</a>
    </div>
  </nav>

  <div class="app">

    <!-- Back Button -->
    <div style="margin:24px 0 0;">
      <a href="ngos.html" class="btn btn-secondary btn-sm">← Back to NGO Portal</a>
    </div>

    <!-- Loading state -->
    <div id="detail-loading" style="text-align:center;padding:100px 0;color:var(--text-muted);">
      <div
        style="width:48px;height:48px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;">
      </div>
      <p>Loading NGO details…</p>
    </div>

    <!-- Content (injected) -->
    <div id="detail-content" style="display:none;">

      <!-- Hero -->
      <div class="hero-ngo" id="hero-section">
        <div class="hero-avatar" id="hero-avatar">🏢</div>
        <div class="hero-info">
          <div id="hero-name" class="hero-name gradient-text">—</div>
          <div id="hero-address" style="color:var(--text-secondary);margin-bottom:12px;font-size:.9rem;">—</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <span id="hero-status">—</span>
            <div class="chip-wrap" id="hero-work-types"></div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="refresh-ind"><span class="refresh-dot"></span> Live</div>
          <button class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick="loadDetail()">🔄 Refresh</button>
        </div>
      </div>

      <!-- Metrics -->
      <div class="metric-grid">
        <div class="metric-box">
          <div class="metric-val gradient-text" id="m-members">—</div>
          <div class="metric-lbl">Total Members</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="m-workforce" style="color:var(--green)">—</div>
          <div class="metric-lbl">Available Workforce</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="m-pct" style="color:var(--cyan)">—</div>
          <div class="metric-lbl">Current Progress</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="m-eta" style="color:var(--amber)">—</div>
          <div class="metric-lbl">ETA to Free</div>
        </div>
        <div class="metric-box">
          <div class="metric-val" id="m-history" style="color:#a78bfa">—</div>
          <div class="metric-lbl">Past Assignments</div>
        </div>
      </div>

      <!-- Current Task -->
      <div id="current-task-wrapper"></div>

      <!-- Map -->
      <div class="section">
        <div class="section-head">
          <div class="section-title">
            <div class="icon-box ib-green">🗺️</div>Location Map
          </div>
        </div>
        <div id="ngo-detail-map"
          style="width:100%;height:350px;border-radius:var(--r-md);border:1px solid var(--glass-border);"></div>
      </div>

      <!-- Work History -->
      <div class="section">
        <div class="section-head">
          <div class="section-title">
            <div class="icon-box ib-purple">📜</div>Assignment History
          </div>
        </div>
        <div class="timeline" id="history-timeline">
          <div class="empty-state">
            <div class="empty-icon">📜</div>
            <p>No history yet</p>
          </div>
        </div>
      </div>

    </div><!-- end detail-content -->
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/app.js"></script>
  <script src="js/ngos.js"></script>
</body>

</html>
